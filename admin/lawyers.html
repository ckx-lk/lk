<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>律师管理 - 广东兰凯律师事务所</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h4>兰凯律所后台</h4>
                <p>广东兰凯律师事务所</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><span class="icon">&#9632;</span> 控制台</a></li>
                <li><a href="articles.html"><span class="icon">&#9632;</span> 文章管理</a></li>
                <li><a href="lawyers.html" class="active"><span class="icon">&#9632;</span> 律师管理</a></li>
                <li><a href="columns.html"><span class="icon">&#9632;</span> 栏目管理</a></li>
                <li><a href="settings.html"><span class="icon">&#9632;</span> 网站设置</a></li>
                <li><a href="javascript:void(0)" onclick="logout()"><span class="icon">&#9632;</span> 退出登录</a></li>
            </ul>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h4>律师管理</h4>
                <div class="user-info">
                    <span>管理员</span>
                    <a href="javascript:void(0)" onclick="logout()">退出</a>
                </div>
            </div>

            <div class="admin-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <p style="color:#999; font-size:14px;">管理律师团队成员信息，添加或修改律师资料。</p>
                    <button class="btn btn-primary" onclick="showLawyerForm()">+ 添加律师</button>
                </div>

                <div id="lawyerList" style="background:#fff; border:1px solid #e0e0e0; padding:25px;">
                    <table class="data-table" id="lawyersTable">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>职位</th>
                                <th>专长</th>
                                <th>照片</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- 律师编辑表单 -->
                <div id="lawyerForm" style="display:none; margin-top:20px;">
                    <div class="admin-form">
                        <h4 style="margin-bottom:25px;" id="lawyerFormTitle">添加律师</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label>姓名 <span style="color:#c62828;">*</span></label>
                                <input type="text" id="lawyerName" placeholder="请输入律师姓名">
                            </div>
                            <div class="form-group">
                                <label>职位 <span style="color:#c62828;">*</span></label>
                                <input type="text" id="lawyerPosition" placeholder="如：合伙人律师、专职律师">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>照片路径</label>
                            <input type="text" id="lawyerPhoto" placeholder="如：images/lawyer_name.jpg">
                            <small>相对于网站根目录的图片路径</small>
                        </div>
                        <div class="form-group">
                            <label>执业专长 <span style="color:#999; font-weight:400;">（用顿号分隔，如：民事诉讼、合同纠纷、公司法务）</span></label>
                            <input type="text" id="lawyerSpecialties" placeholder="民事诉讼、合同纠纷、公司法务" oninput="renderSpecialtyTagsFromInput()">
                            <div id="specialtyTagsDisplay" class="tag-input-wrapper" style="margin-top:8px; pointer-events:none;"></div>
                        </div>
                        <div class="form-group">
                            <label>个人简介</label>
                            <textarea id="lawyerIntro" placeholder="请输入律师个人简介" style="min-height:120px;"></textarea>
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-primary" onclick="saveLawyer()">保存</button>
                            <button class="btn btn-secondary" onclick="hideLawyerForm()">取消</button>
                        </div>
                        <input type="hidden" id="lawyerId">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/admin.js"></script>
    <script>
        checkLogin();
        initLawyers();

        // 实时渲染专长标签预览
        window.renderSpecialtyTagsFromInput = function () {
            var val = document.getElementById('lawyerSpecialties').value;
            var tags = val.split(/[、,，]/).map(function (s) { return s.trim(); }).filter(Boolean);
            var container = document.getElementById('specialtyTagsDisplay');
            container.innerHTML = tags.map(function (t) {
                return '<span class="tag-item">' + t + '</span>';
            }).join('');
        };
    </script>
</body>
</html>
